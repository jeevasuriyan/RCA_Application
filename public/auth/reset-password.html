<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — RCA Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="/auth/auth.css">
</head>
<body>

  <div class="bg-orbs" aria-hidden="true">
    <div class="bg-orb bg-orb-1"></div>
    <div class="bg-orb bg-orb-2"></div>
    <div class="bg-orb bg-orb-3"></div>
  </div>

  <div class="auth-page">
    <div class="auth-card">

      <!-- Brand -->
      <div class="auth-brand">
        <div class="auth-logo-wrap">
          <svg width="26" height="26" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
            <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
          </svg>
        </div>
        <div class="auth-brand-name">RCA Manager</div>
        <div class="auth-brand-sub">Root Cause Analysis Platform</div>
      </div>

      <div id="alert" class="auth-alert hidden"></div>

      <!-- Token-missing warning -->
      <div id="no-token-view" style="display:none; text-align:center; padding: 10px 0 20px;">
        <div style="font-size:40px; margin-bottom:12px;">🔗</div>
        <p style="color:var(--ink-2); font-size:14px; margin-bottom:18px;">
          This link appears to be invalid or expired.<br>Please request a new password reset.
        </p>
        <a href="/auth/forgot-password.html" class="btn-primary" style="text-decoration:none; display:inline-flex;">
          Request New Link
        </a>
      </div>

      <!-- Reset form (shown when token is present) -->
      <div id="reset-view">
        <div style="text-align:center; margin-bottom:16px;">
          <div style="display:inline-flex; align-items:center; justify-content:center;
            width:52px; height:52px; border-radius:50%;
            background:rgba(201,168,76,.12); border:1px solid rgba(201,168,76,.25);">
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--gold)" stroke-width="2">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 11-7.778 7.778 5.5 5.5 0 017.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4"/>
            </svg>
          </div>
        </div>

        <h2 class="auth-heading" style="text-align:center;">Set new password</h2>
        <p class="auth-sub" style="text-align:center;">
          Choose a strong password for your account. You'll use it to sign in going forward.
        </p>

        <form id="reset-form" novalidate>

          <div class="form-group">
            <label class="form-label" for="password">New Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                  <path d="M7 11V7a5 5 0 0110 0v4"/>
                </svg>
              </span>
              <input class="form-input has-eye" type="password" id="password"
                placeholder="Min. 8 characters" required>
              <button type="button" class="eye-btn" aria-label="Toggle password">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
            <div class="pwd-meter" id="pwd-meter">
              <div class="pwd-bar"></div><div class="pwd-bar"></div>
              <div class="pwd-bar"></div><div class="pwd-bar"></div>
              <span class="pwd-label"></span>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label" for="confirm">Confirm Password</label>
            <div class="input-wrap">
              <span class="input-icon">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
              </span>
              <input class="form-input has-eye" type="password" id="confirm"
                placeholder="Re-enter your new password" required>
              <button type="button" class="eye-btn" aria-label="Toggle confirm">
                <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                  <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                </svg>
              </button>
            </div>
          </div>

          <button type="submit" class="btn-primary" id="submit-btn">
            <div class="btn-spinner"></div>
            <span class="btn-label">Update Password</span>
          </button>

        </form>
      </div>

      <div class="auth-footer" style="margin-top:18px;">
        <a href="/auth/login.html" class="auth-link">← Back to sign in</a>
      </div>

    </div>
  </div>

  <div class="toasts"></div>

  <script src="/auth/auth.js"></script>
  <script>
    AUTH.requireGuest();
    AUTH.initEyeToggles();
    AUTH.initStrength('password', 'pwd-meter');

    // Extract token from URL
    const params = new URLSearchParams(window.location.search);
    const token  = params.get('token');

    if (!token) {
      document.getElementById('reset-view').style.display  = 'none';
      document.getElementById('no-token-view').style.display = 'block';
    }

    document.getElementById('reset-form')?.addEventListener('submit', async e => {
      e.preventDefault();
      AUTH.hideAlert('alert');

      const password = document.getElementById('password').value;
      const confirm  = document.getElementById('confirm').value;
      const btn      = document.getElementById('submit-btn');

      if (!password || !confirm) {
        AUTH.showAlert('alert', 'Both password fields are required.'); return;
      }
      if (password.length < 8) {
        AUTH.showAlert('alert', 'Password must be at least 8 characters.'); return;
      }
      if (password !== confirm) {
        AUTH.showAlert('alert', 'Passwords do not match.'); return;
      }

      AUTH.setLoading(btn, true);
      try {
        const data = await AUTH.api('POST', '/auth/reset-password', { token, password });
        AUTH.showAlert('alert', data.message + ' Redirecting to sign in…', 'success');
        setTimeout(() => window.location.replace('/auth/login.html'), 2200);
      } catch (err) {
        AUTH.showAlert('alert', err.message);
        AUTH.setLoading(btn, false);
      }
    });
  </script>
</body>
</html>
